<!DOCTYPE html>
<html>

<head>
    <title>Stock Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }
        
        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        
        .container {
            padding: 30px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
        }
        
        th,
        td {
            padding: 15px;
            text-align: center;
        }
        
        th {
            background: #020617;
        }
        
        tr {
            border-bottom: 1px solid #334155;
        }
        
        .up {
            color: #22c55e;
        }
        
        .down {
            color: #ef4444;
        }
        
        button {
            padding: 5px 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
        
        .search {
            margin-bottom: 20px;
            padding: 10px;
            width: 300px;
        }
    </style>
</head>

<body>

    <header>
        Stock Dashboard
    </header>

    <div class="container">

        <input type="text" id="search" class="search" placeholder="Search stock..." onkeyup="searchStock()">

        <table id="stockTable">
            <tr>
                <th>Stock</th>
                <th>Price</th>
                <th>Change</th>
                <th>Trend</th>
                <th>Action</th>
            </tr>
        </table>

    </div>

    <script>
        let stocks = [{
                name: "TCS",
                prices: [3500, 3480, 3490, 3510]
            }, {
                name: "INFY",
                prices: [1500, 1510, 1520, 1535]
            }, {
                name: "HDFC",
                prices: [1600, 1580, 1570, 1590]
            }, {
                name: "ITC",
                prices: [420, 425, 430, 435]
            },

            {
                name: "WIPRO",
                prices: [420, 430, 440, 450]
            }, {
                name: "HCLTECH",
                prices: [1100, 1120, 1130, 1150]
            }, {
                name: "SBIN",
                prices: [600, 610, 620, 630]
            }, {
                name: "AXISBANK",
                prices: [900, 910, 920, 940]
            }, {
                name: "ICICIBANK",
                prices: [950, 960, 970, 990]
            },

            {
                name: "KOTAKBANK",
                prices: [1800, 1820, 1840, 1860]
            }, {
                name: "LT",
                prices: [2900, 2920, 2950, 2980]
            }, {
                name: "BAJFINANCE",
                prices: [7000, 7100, 7200, 7350]
            }, {
                name: "MARUTI",
                prices: [10000, 10100, 10250, 10400]
            }, {
                name: "TITAN",
                prices: [3000, 3050, 3100, 3200]
            },

            {
                name: "ADANIENT",
                prices: [2500, 2550, 2600, 2700]
            }, {
                name: "ADANIPORTS",
                prices: [800, 820, 840, 860]
            }, {
                name: "ULTRACEMCO",
                prices: [8500, 8600, 8700, 8850]
            }, {
                name: "ASIANPAINT",
                prices: [3200, 3250, 3300, 3400]
            }, {
                name: "NESTLEIND",
                prices: [22000, 22100, 22250, 22400]
            },

            {
                name: "POWERGRID",
                prices: [220, 225, 230, 235]
            }, {
                name: "NTPC",
                prices: [300, 305, 310, 320]
            }, {
                name: "ONGC",
                prices: [180, 185, 190, 200]
            }, {
                name: "COALINDIA",
                prices: [250, 255, 260, 270]
            }, {
                name: "BPCL",
                prices: [450, 460, 470, 480]
            },

            {
                name: "HEROMOTOCO",
                prices: [2800, 2850, 2900, 3000]
            }, {
                name: "EICHERMOT",
                prices: [3500, 3550, 3600, 3700]
            }, {
                name: "TATAMOTORS",
                prices: [800, 820, 850, 880]
            }, {
                name: "TATASTEEL",
                prices: [120, 125, 130, 140]
            }, {
                name: "JSWSTEEL",
                prices: [700, 710, 720, 740]
            },

            {
                name: "TECHM",
                prices: [1200, 1210, 1220, 1250]
            }, {
                name: "DRREDDY",
                prices: [5500, 5600, 5700, 5800]
            }, {
                name: "SUNPHARMA",
                prices: [1100, 1120, 1150, 1180]
            }, {
                name: "CIPLA",
                prices: [1000, 1010, 1020, 1040]
            }, {
                name: "DIVISLAB",
                prices: [4000, 4050, 4100, 4200]
            }
        ];

        function calculateTrend(prices) {
            let n = prices.length;

            // DAA logic (simple comparison)
            if (prices[n - 1] > prices[n - 2]) return " Up";
            else return " Down";
        }

        function renderTable() {
            let table = document.getElementById("stockTable");

            for (let stock of stocks) {

                let last = stock.prices[stock.prices.length - 1];
                let prev = stock.prices[stock.prices.length - 2];

                let change = ((last - prev) / prev * 100).toFixed(2);
                let trend = calculateTrend(stock.prices);

                let row = `
            <tr>
                <td>${stock.name}</td>
                <td>${last}</td>
                <td class="${change >= 0 ? 'up' : 'down'}">${change}%</td>
                <td>${trend}</td>
                <td><button onclick="viewStock('${stock.name}')">View</button></td>
            </tr>
        `;

                table.innerHTML += row;
            }
        }

        function searchStock() {
            let input = document.getElementById("search").value.toUpperCase();
            let rows = document.getElementById("stockTable").getElementsByTagName("tr");

            for (let i = 1; i < rows.length; i++) {
                let stockName = rows[i].getElementsByTagName("td")[0].innerText;

                if (stockName.indexOf(input) > -1) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }

        function viewStock(name) {
            alert("Opening prediction for " + name);
            console.log("Opening prediction for", stockName);
        }

        renderTable();
    </script>

</body>

</html>
